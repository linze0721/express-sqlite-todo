<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Todo List — Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: [
              'ui-sans-serif',
              'system-ui',
              '-apple-system',
              'BlinkMacSystemFont',
              '"Segoe UI"',
              'Roboto',
              '"Helvetica Neue"',
              'Arial',
              'sans-serif',
            ],
          },
          maxWidth: {
            app: '600px',
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased">
  <div class="min-h-screen flex flex-col items-center justify-center px-4 py-12 sm:py-16">
    <main class="w-full max-w-app mx-auto text-center">
      <div class="mb-8 inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white shadow-sm border border-slate-200/80 text-slate-700" aria-hidden="true">
        <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>

      <p class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-3">Product mockup</p>
      <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight text-slate-900 mb-3">
        Simple Todo List
      </h1>
      <p class="text-base sm:text-lg text-slate-600 leading-relaxed max-w-md mx-auto mb-10">
        A minimal, focused task list—add items, mark them done, and keep your day clear.
      </p>

      <a
        href="todo.html"
        class="inline-flex items-center justify-center gap-2 w-full sm:w-auto min-h-[48px] px-8 py-3 rounded-xl bg-slate-900 text-white text-base font-medium shadow-md shadow-slate-900/15 hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-900 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-50 transition-colors"
      >
        Open todo app
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </a>

      <p class="mt-8 text-sm text-slate-500">
        Primary screen:
        <a href="todo.html" class="text-slate-700 underline underline-offset-2 decoration-slate-300 hover:decoration-slate-500">design/todo.html</a>
      </p>
    </main>

    <footer class="mt-auto pt-12 text-xs text-slate-400">
      Design preview · 600px app width
    </footer>
  </div>
</body>
</html>
